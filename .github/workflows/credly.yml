name: Actualizar Insignias de Credly

on:
  schedule:
    - cron: '0 0 * * *' # Corre todos los días a la medianoche
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write # Otorga permiso explícito para editar tu README

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Actualizar README con Credly
        uses: pemtajo/badge-readme@main # Nombre de acción corregido
        with:
          CREDLY_USER: "kevin-daniel-yuvi-chamorro" # Reemplaza con tu usuario exacto de Credly
          NUMBER_LAST_BADGES: 0 # Muestra todas tus insignias (usa un número si quieres limitarlas)
