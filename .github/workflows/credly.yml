name: Actualizar Insignias de Credly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-badges:
    name: Update README with Credly Badges
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Actualizar README con Credly
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: "kevin-daniel-yuvi-chamorro"
          NUMBER_LAST_BADGES: 0
